<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Vitória ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .card {
        background: rgba(255,255,255,0.95);
        padding: 35px;
        border-radius: 25px;
        text-align: center;
        max-width: 450px;
        box-shadow: 0 15px 40px rgba(0,0,0,.15);
    }

    h1 {
        color: #ff4d6d;
        margin-bottom: 15px;
    }

    p {
        color: #555;
        margin-bottom: 20px;
    }

    button {
        background: #ff4d6d;
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 999px;
        font-size: 16px;
        cursor: pointer;
        transition: .3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    #mensagem {
        margin-top: 25px;
        line-height: 1.8;
        color: #333;
        opacity: 0;
        transition: 1s;
    }

    .heart {
        position: absolute;
        font-size: 24px;
        animation: float 5s linear forwards;
    }

    @keyframes float {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-700px);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Para Mozi ❤️</h1>
    <p>Clique no botão abaixo.</p>

    <button onclick="surpresa()">
        Clique aqui ✨
    </button>

    <div id="mensagem"></div>
</div>

<script>
function surpresa() {

    const mensagem = document.getElementById("mensagem");

    mensagem.innerHTML = `
        <strong>Do Loteamento Nova Aurora até a 13 de Julho...</strong><br><br>

        Mudaram as ruas, os caminhos e os lugares.<br>
        Mudamos também.<br><br>

        Mas existe uma coisa que continuou exatamente igual:<br><br>

        <strong>Eu continuo escolhendo você.</strong> ❤️<br><br>

        Obrigado por fazer parte da minha história
        e por transformar os dias comuns
        nos meus dias favoritos.<br><br>

        Te amo, Vivi. ❤️<br><br>

    `;

    mensagem.style.opacity = "1";

    for(let i = 0; i < 40; i++) {
        setTimeout(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, i * 120);
    }
}
</script>

</body>
</html>
